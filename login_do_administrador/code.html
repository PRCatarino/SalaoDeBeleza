            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="font-body bg-background text-on-background min-h-screen flex items-center justify-center editorial-gradient p-6">
<!-- Login Container -->
<main class="w-full max-w-[440px] animate-fade-in">
<!-- Identity Header (The Anchor) -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary-container mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-background">Maison de Beauté</h1>
<p class="text-on-surface-variant font-body mt-2 text-sm tracking-wide">THE DIGITAL CONCIERGE FOR ARTISANS</p>
</div>
<!-- The Editorial Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_8px_32px_rgba(11,28,48,0.06)] relative overflow-hidden group">
<!-- Subtle Top Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary opacity-80"></div>
<div class="space-y-6">
<!-- Form Fields -->
<div class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-widest" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary text-on-surface font-body transition-all placeholder:text-outline/50" id="email" name="email" placeholder="atelier@maison.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label text-[0.6875rem] font-semibold text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<a class="text-[0.6875rem] font-bold text-primary-container hover:text-primary transition-colors uppercase tracking-wider" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary text-on-surface font-body transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-gradient-to-r from-primary to-primary-container text-on-primary font-body font-semibold rounded-lg shadow-md hover:shadow-lg hover:scale-[1.01] active:scale-[0.98] transition-all duration-200">
                    Sign In
                </button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label text-[0.625rem] text-on-surface-variant uppercase tracking-[0.2em]">Or Continue With</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-12 bg-surface-container-lowest border border-outline-variant/30 rounded-lg hover:bg-surface-container-low transition-colors group">
<svg class="w-5 h-5 mr-2" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.26.81-1.58z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center h-12 bg-surface-container-lowest border border-outline-variant/30 rounded-lg hover:bg-surface-container-low transition-colors group">
<svg class="w-5 h-5 mr-2" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.78-3.19 1.76-1.14-.02-1.5-.72-2.81-.72-1.3 0-1.71.71-2.81.74-1.12.03-2.22-.85-3.21-1.77C3.04 18.39 1.5 15.31 1.5 12.39c0-3.04 1.91-4.64 3.76-4.67 1.15-.02 2.22.77 2.92.77.71 0 1.94-.96 3.3-.82.57.02 2.18.23 3.21 1.73-.08.05-1.92 1.12-1.9 3.33.02 2.64 2.29 3.51 2.31 3.52-.02.05-.36 1.23-1.25 2.31zM11.97 7.22c-.08-1.56 1.23-2.9 2.76-3.08.15 1.79-1.39 3.24-2.76 3.08z"></path>
</svg>
<span class="text-sm font-medium text-on-surface">Apple</span>
</button>
</div>
</div>
</div>
<!-- Footer Call to Action -->
<div class="mt-8 text-center">
<p class="font-body text-sm text-on-surface-variant">
                New salon owner? 
                <a class="ml-1 font-bold text-primary-container hover:underline decoration-primary-container/30 underline-offset-4 transition-all" href="#">Start your free trial</a>
</p>
</div>
<!-- Editorial Background Decor -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-fixed/20 blur-[120px] rounded-full -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-secondary-fixed/20 blur-[120px] rounded-full -z-10"></div>
</main>
<!-- Visual Polish Image (Purely Aesthetic) -->
<div class="fixed bottom-12 right-12 hidden xl:block w-64 opacity-20 hover:opacity-40 transition-opacity duration-700 pointer-events-none">
<div class="aspect-[3/4] rounded-2xl overflow-hidden grayscale contrast-125">
<img alt="editorial portrait" class="w-full h-full object-cover" data-alt="high-fashion editorial photography of a modern minimalist salon interior with soft natural light and architectural shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0_3Bzfgnvy1ZzP_Lk41GLFeSVHX23jIt0zvRzEpYAOIbLKe86dZZtKqnjWaGY4Hm-mcxhCQH0yAHVtmvvN4j_3wJC2s4K88igndeBTR9dJ3wbxSW-bZnRfUCtwm60PnxrSy4cGDS4Io_2Gz-069UzC1TBpzzqhWcAya_ngieXGqaUqGmnqZ_L_QEnMDj5LrlZgAaiWC2kgLhDxbQPEBCFdgEtft3bpKu9HAis7AmJrmwznhOYFP3luAPg9Ufe6_Rxle0y2kKUGw"/>
</div>
<p class="mt-4 font-label text-[0.625rem] text-on-surface-variant text-right tracking-widest uppercase italic">The Art of Management</p>
</div>
